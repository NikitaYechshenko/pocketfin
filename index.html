<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFin — Скоро запуск</title>
    <style>
        /* Базовые стили */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Темно-синий фон */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* Контейнер контента */
        .container {
            max-width: 600px;
            padding: 2rem;
            z-index: 10;
        }

        /* Бейдж статуса */
        .badge {
            display: inline-flex;
            align-items: center;
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            color: #cbd5e1;
        }

        /* Пульсирующая точка */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #10b981; /* Изумрудный цвет */
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        /* Заголовок логотипа */
        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            color: #e2e8f0;
        }

        h1 span {
            color: #3b82f6; /* Синий акцент для слова Fin */
        }

        /* Описание */
        p.description {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #94a3b8;
        }

        /* Кнопка GitHub */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #2563eb;
            color: white;
            padding: 0.875rem 1.75rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Иконка GitHub (SVG) */
        .github-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            fill: currentColor;
        }

        /* Фоновые декорации */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="badge">
            <span class="status-dot"></span>
            Активная разработка
        </div>
        
        <h1>Pocket<span>Fin</span></h1>
        
        <p class="description">
            Умный трекер для управления глобальными активами и личными финансами. Мы пишем код, чтобы вы могли легко контролировать свои деньги.
        </p>
        
        <a href="https://github.com/NikitaYechshenko/Global-Asset-Tracker" class="btn" target="_blank" rel="noopener noreferrer">
            <svg class="github-icon" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            Следить за проектом на GitHub
        </a>
    </div>
</body>
</html>
