services:
  db:
    image: postgres:15-alpine
    container_name: gat_db_container
    restart: always
    env_file:
      - .env
    environment:
      # Переменные, которые ожидает официальный образ Postgres
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: