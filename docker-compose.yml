version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gat_db
    ports:
      - "5433:5432"  # Убрал лишнюю вложенность 'ports:'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
